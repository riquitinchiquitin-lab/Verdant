<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Verdant | Global v0.09</title>
    
    <!-- Mobile Full Screen / PWA Standalone Mode -->
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-title" content="Verdant">
    <link rel="apple-touch-icon" href="./logo.svg">
    <link rel="icon" type="image/svg+xml" href="./logo.svg">
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      (function() {
        const savedTheme = localStorage.getItem('verdant-theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
</head>
  <body class="bg-white text-slate-900 antialiased dark:bg-[#020617] dark:text-slate-100 transition-colors duration-300 no-scrollbar">
    <div id="root"></div>
    <script src="/env-config.js"></script>
    <script>
      (function() {
        const key = window._ENV_?.GOOGLE_MAPS_API_KEY;
        if (key) {
          const script = document.createElement('script');
          script.src = `https://maps.googleapis.com/maps/api/js?libraries=places&key=${key}`;
          script.async = true;
          script.defer = true;
          document.head.appendChild(script);
        }
      })();
    </script>
    <!-- Vite Entry Point -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
